services:
  db:
    image: postgres:15-alpine
    container_name: parcial_prog4_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234postgres
      POSTGRES_DB: parcial_prog4
    ports:
      - "5434:5432"
    volumes:
      - parcial_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  parcial_pg_data:
